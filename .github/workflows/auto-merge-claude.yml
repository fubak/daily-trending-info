name: Auto-merge Claude branches

# Automatically merges claude/* branches to main via PR

on:
  push:
    branches:
      - 'claude/**'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Create and merge PR
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          # Pass the (untrusted) branch name via env, not direct ${{ }}
          # interpolation, to avoid shell command injection.
          BRANCH: ${{ github.ref_name }}
        run: |
          # Check if PR already exists
          EXISTING_PR=$(gh pr list --head "$BRANCH" --base main --json number -q '.[0].number' 2>/dev/null || echo "")

          if [ -z "$EXISTING_PR" ]; then
            # Create new PR
            PR_URL=$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Auto-merge: $BRANCH" \
              --body "Automated PR from Claude Code session.

              Triggered by push to \`$BRANCH\`")
            echo "Created PR: $PR_URL"
          else
            echo "PR #$EXISTING_PR already exists"
          fi

          # Enable auto-merge (squash). --auto queues the merge and lets it
          # complete only once the required CI checks (test (py3.11/3.12)) pass,
          # instead of merging immediately and racing the checks. No --admin:
          # required checks actually gate the merge.
          gh pr merge "$BRANCH" --auto --squash --delete-branch
